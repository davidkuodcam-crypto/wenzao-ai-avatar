<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文藻 AI 虛擬助教</title>
    <!-- 引入 Tailwind CSS 作為 UI 樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* 隱藏原始的 file input */
        input[type="file"] { display: none; }
    </style>

    <!-- 設定 Three.js 與 Three-VRM 的 Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <!-- WebGL 渲染容器 -->
    <div id="canvas-container"></div>

    <!-- UI 介面層 -->
    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        <!-- 對話氣泡窗 (預設隱藏) -->
        <div id="chat-bubble" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-black/60 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl border border-white/20 max-w-lg w-full hidden pointer-events-auto transition-all duration-300 z-10">
            <p id="chat-text" class="text-sm leading-relaxed"></p>
        </div>

        <!-- 底部中央對話輸入框 -->
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-full max-w-lg pointer-events-auto flex gap-2 z-10">
            <input type="text" id="chat-input" placeholder="與助教對話..." class="flex-1 bg-gray-900/80 backdrop-blur text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-400 shadow-lg text-sm" />
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl shadow-lg transition-colors font-bold text-sm shrink-0">發送</button>
        </div>

        <div class="flex justify-between items-end w-full">
            <div class="bg-gray-900/70 backdrop-blur-md text-white p-4 rounded-xl shadow-xl border border-gray-700/50 max-w-xs pointer-events-auto flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold text-blue-400">文藻 AI 虛擬助教</h1>
                </div>
                <p class="text-xs text-gray-300">支援語音對話與表情連動。正在使用 Gemini 2.5 Flash。</p>
                
                <div id="loading-status" class="mt-2 text-xs text-yellow-400 hidden flex items-center justify-center">
                    載入模型中...
                </div>
                <div id="error-status" class="mt-2 text-xs text-red-400 hidden text-center"></div>
            </div>

            <!-- 操作說明 -->
            <div class="bg-gray-900/70 backdrop-blur-md text-white p-3 rounded-xl shadow-lg border border-gray-700/50 text-xs pointer-events-auto">
                <h3 class="font-bold text-gray-200 mb-1 border-b border-gray-600 pb-1">操作說明</h3>
                <ul class="space-y-1 text-gray-400">
                    <li><span class="text-blue-400 font-bold">左鍵</span> : 旋轉 | <span class="text-blue-400 font-bold">右鍵</span> : 平移</li>
                    <li><span class="text-blue-400 font-bold">滾輪</span> : 縮放視角</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, controls, currentVrm;
        const clock = new THREE.Clock();

        let expTimer = 0, expBlend = 1, curExp = 'neutral', tgtExp = 'neutral';
        const exps = ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'neutral'];
        let specAct = null, specTimer = 0;
        let isSpeaking = false, lipSyncTimer = 0, conversationHistory = [];

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xdbe3ea);
            scene.fog = new THREE.Fog(0xdbe3ea, 10, 50);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.45, -1.6); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.3, 0); 
            controls.update();

            const light = new THREE.DirectionalLight(0xfff0dd, 2.0);
            light.position.set(2, 5, 3);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

            // 載入模型邏輯
            if (window.location.protocol.startsWith('http')) {
                loadVRM('./AvatarSample_C.vrm');
            } else {
                const errorUI = document.getElementById('error-status');
                errorUI.innerHTML = '【預覽模式】沙盒環境限制讀取本地模型。<br>Vercel 部署後即可正常載入！';
                errorUI.classList.remove('hidden');
            }
        }

        function loadVRM(url) {
            document.getElementById('loading-status').classList.remove('hidden');
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                if (currentVrm) scene.remove(currentVrm.scene);
                VRMUtils.combineSkeletons(gltf.scene);
                vrm.scene.rotation.y = Math.PI;
                vrm.scene.position.y = 0.1;
                scene.add(vrm.scene);
                currentVrm = vrm;
                document.getElementById('loading-status').classList.add('hidden');
            }, undefined, (error) => {
                document.getElementById('loading-status').classList.add('hidden');
                document.getElementById('error-status').innerHTML = '模型載入失敗';
                document.getElementById('error-status').classList.remove('hidden');
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            if (currentVrm) {
                if (currentVrm.humanoid) {
                    const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
                    if (chest) chest.rotation.x = Math.sin(time * 1.5) * 0.015;
                }
                if (currentVrm.expressionManager) {
                    expTimer += delta;
                    if (expTimer > 4.0) {
                        expTimer = 0; curExp = tgtExp;
                        tgtExp = exps[Math.floor(Math.random() * exps.length)];
                        expBlend = 0;
                    }
                    if (expBlend < 1.0) expBlend += delta * 2.0;
                    exps.forEach(e => currentVrm.expressionManager.setValue(e, 0));
                    currentVrm.expressionManager.setValue(curExp, 1 - expBlend);
                    currentVrm.expressionManager.setValue(tgtExp, expBlend);

                    if (specTimer > 0 && specAct) {
                        specTimer -= delta;
                        currentVrm.expressionManager.setValue(specAct, 1.0);
                    }
                    if (isSpeaking && specAct !== 'aa') {
                        lipSyncTimer += delta * 15;
                        currentVrm.expressionManager.setValue('aa', (Math.sin(lipSyncTimer) + 1) / 2 * 0.7);
                    }
                }
                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }

        const chatInput = document.getElementById('chat-input');
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            document.getElementById('chat-bubble').classList.remove('hidden');
            document.getElementById('chat-text').innerHTML = `你：${text}<br><span class="text-gray-400">思考中...</span>`;
            conversationHistory.push({ role: "user", parts: [{ text: text }] });
            
            try {
                // 發送請求至後端代理 api/chat.js
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        systemInstruction: { parts: [{ text: "你是一個 3D 虛擬助教。請用繁體中文回答，你的回答「必須」是純 JSON 格式，不含 markdown 標籤。格式範例：{\"reply\": \"回答內容\", \"expression\": \"happy\", \"specialAction\": \"none\", \"actionDuration\": 3}。情緒可選: happy, angry, sad, relaxed, surprised, neutral。動作可選: none, blink, aa。" }] }
                    })
                });

                const rawData = await response.json();
                if (rawData.error) throw new Error(rawData.error);

                // 解析 Google 回傳的原始文字內容
                const aiResultString = rawData.candidates[0].content.parts[0].text;
                // 清理可能包含的 Markdown 語法標記（防呆）
                const jsonContent = aiResultString.replace(/```json\n?/, '').replace(/```\n?$/, '').trim();
                const res = JSON.parse(jsonContent);

                conversationHistory.push({ role: "model", parts: [{ text: aiResultString }] });
                
                // 更新表情與動作
                if (exps.includes(res.expression)) {
                    tgtExp = res.expression;
                    expBlend = 0; expTimer = -5;
                }
                specAct = res.specialAction !== 'none' ? res.specialAction : null;
                specTimer = res.actionDuration || 0;

                document.getElementById('chat-text').innerHTML = `助教：${res.reply}`;
                speak(res.reply);
            } catch (error) {
                document.getElementById('chat-text').innerHTML = `<span class="text-red-400">連線失敗: ${error.message}</span>`;
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            u.onstart = () => { isSpeaking = true; };
            u.onend = () => { isSpeaking = false; };
            window.speechSynthesis.speak(u);
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        init();
    </script>
</body>
</html>
