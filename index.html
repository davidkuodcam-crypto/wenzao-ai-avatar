<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文藻 AI 虛擬助教</title>
    <!-- 引入 Tailwind CSS 作為 UI 樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* 隱藏原始的 file input */
        input[type="file"] { display: none; }
    </style>

    <!-- 設定 Three.js 與 Three-VRM 的 Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <!-- WebGL 渲染容器 -->
    <div id="canvas-container"></div>

    <!-- UI 介面層 -->
    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        <!-- 對話氣泡窗 (預設隱藏) -->
        <div id="chat-bubble" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-black/60 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl border border-white/20 max-w-lg w-full hidden pointer-events-auto transition-all duration-300 z-10">
            <p id="chat-text" class="text-sm leading-relaxed"></p>
        </div>

        <!-- 底部中央對話輸入框 -->
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-full max-w-lg pointer-events-auto flex gap-2 z-10">
            <input type="text" id="chat-input" placeholder="與助教對話..." class="flex-1 bg-gray-900/80 backdrop-blur text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-400 shadow-lg text-sm" />
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl shadow-lg transition-colors font-bold text-sm shrink-0">發送</button>
        </div>

        <div class="flex justify-between items-end w-full">
            <div class="bg-gray-900/70 backdrop-blur-md text-white p-4 rounded-xl shadow-xl border border-gray-700/50 max-w-xs pointer-events-auto flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold text-blue-400">文藻 AI 虛擬助教</h1>
                </div>
                <p class="text-xs text-gray-300">支援語音對話與表情連動。正在使用 Gemini 2.5 Flash。</p>
                
                <div id="loading-status" class="mt-2 text-xs text-yellow-400 hidden flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-2 h-3 w-3 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    模型載入中...
                </div>
                <div id="error-status" class="mt-2 text-xs text-red-400 hidden text-center"></div>
            </div>

            <!-- 操作說明 -->
            <div class="bg-gray-900/70 backdrop-blur-md text-white p-3 rounded-xl shadow-lg border border-gray-700/50 text-xs pointer-events-auto">
                <h3 class="font-bold text-gray-200 mb-1 border-b border-gray-600 pb-1">操作說明</h3>
                <ul class="space-y-1 text-gray-400">
                    <li><span class="text-blue-400 font-bold">左鍵</span> : 旋轉 | <span class="text-blue-400 font-bold">右鍵</span> : 平移</li>
                    <li><span class="text-blue-400 font-bold">滾輪</span> : 縮放視角</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        // --- 全域變數 ---
        let scene, camera, renderer, controls;
        let currentVrm = undefined;
        let particles;
        const clock = new THREE.Clock();

        // 表情控制變數
        let expressionTimer = 0;
        let expressionBlend = 1;
        let currentExpression = 'neutral';
        let targetExpression = 'neutral';
        const expressions = ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'neutral'];

        // 特殊動作控制變數
        let activeSpecialAction = null;
        let specialActionTimer = 0;

        // 對話與語音變數
        let isSpeaking = false;
        let lipSyncTimer = 0;
        let conversationHistory = [];

        // --- 初始化場景 ---
        function init() {
            const container = document.getElementById('canvas-container');

            // 1. 建立場景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xdbe3ea);
            scene.fog = new THREE.Fog(0xdbe3ea, 10, 50);

            // 2. 建立相機
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.45, -1.6); 

            // 3. 建立渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // 4. 控制器 (OrbitControls)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.screenSpacePanning = true;
            controls.target.set(0, 1.3, 0); 
            controls.update();

            // 5. 建立背景與環境
            setupEnvironment();

            // 6. 監聽視窗縮放
            window.addEventListener('resize', onWindowResize);

            // 7. 開始動畫迴圈
            animate();

            // 8. 自動載入模型 (偵測環境以避免預覽錯誤)
            let modelPath = './AvatarSample_C.vrm';
            
            // 如果在 blob 預覽環境，直接攔截並顯示提示
            if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') {
                const errorUI = document.getElementById('error-status');
                document.getElementById('loading-status').classList.add('hidden');
                errorUI.innerHTML = '【預覽模式】<br>沙盒環境限制讀取本地模型。<br>Vercel 部署後即可正常載入專屬角色！';
                errorUI.classList.remove('text-red-400');
                errorUI.classList.add('text-blue-300');
                errorUI.classList.remove('hidden');
                return;
            }
            loadVRM(modelPath);
        }

        function setupEnvironment() {
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x999999, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xfff0dd, 2.0);
            directionalLight.position.set(2, 5, 3);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const floorGeometry = new THREE.PlaneGeometry(50, 50);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x8a95a5, roughness: 0.6 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const pedestalGeometry = new THREE.CylinderGeometry(0.8, 1, 0.1, 32);
            const pedestalMaterial = new THREE.MeshStandardMaterial({ color: 0xdbe3ea });
            const pedestal = new THREE.Mesh(pedestalGeometry, pedestalMaterial);
            pedestal.position.y = 0.05;
            pedestal.receiveShadow = true;
            scene.add(pedestal);

            const particleCount = 200;
            const particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 10;
                positions[i*3+1] = Math.random() * 5;
                positions[i*3+2] = (Math.random() - 0.5) * 10;
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles = new THREE.Points(particleGeometry, new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.5 }));
            scene.add(particles);
        }

        function loadVRM(url) {
            const loadingUI = document.getElementById('loading-status');
            const errorUI = document.getElementById('error-status');
            loadingUI.classList.remove('hidden');
            errorUI.classList.add('hidden');

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                if (currentVrm) scene.remove(currentVrm.scene);

                VRMUtils.removeUnnecessaryVertices(gltf.scene);
                VRMUtils.combineSkeletons(gltf.scene);

                vrm.scene.traverse((obj) => {
                    obj.frustumCulled = false;
                    if (obj.isMesh) obj.castShadow = obj.receiveShadow = true;
                });

                if (vrm.humanoid) {
                    const lA = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
                    const rA = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
                    if (lA) lA.rotation.z = -1.1; 
                    if (rA) rA.rotation.z = 1.1; 
                }

                vrm.scene.position.y = 0.1;
                vrm.scene.rotation.y = Math.PI;
                scene.add(vrm.scene);
                currentVrm = vrm;
                loadingUI.classList.add('hidden');
            }, undefined, (error) => {
                loadingUI.classList.add('hidden');
                errorUI.textContent = '模型載入失敗。';
                errorUI.classList.remove('hidden');
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (currentVrm) {
                if (currentVrm.humanoid) {
                    const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
                    if (chest) chest.rotation.x = Math.sin(time * 1.5) * 0.015;
                }

                if (currentVrm.expressionManager) {
                    expressionTimer += delta;
                    if (expressionTimer > 4.0) {
                        expressionTimer = 0;
                        currentExpression = targetExpression;
                        targetExpression = expressions[Math.floor(Math.random() * expressions.length)];
                        expressionBlend = 0;
                    }
                    if (expressionBlend < 1.0) expressionBlend += delta * 2.0;

                    expressions.forEach(exp => currentVrm.expressionManager.setValue(exp, 0));
                    currentVrm.expressionManager.setValue(currentExpression, 1.0 - expressionBlend);
                    currentVrm.expressionManager.setValue(targetExpression, expressionBlend);

                    if (specialActionTimer > 0 && activeSpecialAction) {
                        specialActionTimer -= delta;
                        currentVrm.expressionManager.setValue(activeSpecialAction, 1.0);
                    }

                    if (isSpeaking && activeSpecialAction !== 'aa') {
                        lipSyncTimer += delta * 15;
                        currentVrm.expressionManager.setValue('aa', (Math.sin(lipSyncTimer) + 1) / 2 * 0.7);
                    }
                }
                currentVrm.update(delta);
            }
            if (particles) particles.rotation.y += delta * 0.05;
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBubble = document.getElementById('chat-bubble');
        const chatText = document.getElementById('chat-text');

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            chatBubble.classList.remove('hidden');
            chatText.innerHTML = `你：${text}<br><span class="text-gray-400">正在思考中...</span>`;

            conversationHistory.push({ role: "user", parts: [{ text: text }] });
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: conversationHistory,
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    reply: { type: "STRING" },
                                    expression: { type: "STRING" },
                                    specialAction: { type: "STRING" },
                                    actionDuration: { type: "NUMBER" }
                                },
                                required: ["reply", "expression", "specialAction", "actionDuration"]
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error('API 連線失敗');

                const res = await response.json();
                conversationHistory.push({ role: "model", parts: [{ text: JSON.stringify(res) }] });
                
                if (expressions.includes(res.expression)) {
                    currentExpression = targetExpression;
                    targetExpression = res.expression;
                    expressionBlend = 0;
                    expressionTimer = -5.0; 
                }
                if (res.specialAction && res.specialAction !== 'none') {
                    activeSpecialAction = res.specialAction;
                    specialActionTimer = res.actionDuration || 3;
                }

                chatText.innerHTML = `助教：${res.reply}`;
                speak(res.reply);

            } catch (error) {
                chatText.innerHTML = `<span class="text-red-400">連線失敗: ${error.message}</span>`;
                conversationHistory.pop();
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            window.speechSynthesis.speak(utterance);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        init();
    </script>
</body>
</html>
